# verso.conf - Configuration for verso_2

# Site metadata
SITE_TITLE="CS.077 Gromacs-LS and MDStress"
SITE_URL="https://CS-077-Gromacs-LS-and-MDStress.github.io"
SITE_DESCRIPTION="Capstone Website"
AUTHOR="Juan Vanegas, Finlay Curtiss, Nathaiel Chappelle, Abdul Raziq, Joo Wang Lee"
SITE_AUTHOR_EMAIL="chappeln@oregonstate.edu"
AUTHOR_GIT_HOST="https://github.com/vanegasj/gromacs-ls-2025.4"

# Paths
INPUT_DIR="content"
OUTPUT_DIR="dist"
TEMPLATE_DIR="templates"

# Markdown processor (lowdown, cmark, markdown, discount, etc.)
MD_PROCESSOR="cmark"
# MD_FLAGS="-thtml --html-no-skiphtml --html-no-escapehtml"

# File handling
COPY_EXTENSIONS="jpg jpeg png gif svg pdf css js ico webp woff woff2 ttf"
IGNORE_PATTERNS="^\. .*\.swp$ .*~$"

# Features
GENERATE_RSS="no"
GENERATE_SITEMAP="yes"
CLEAN_URLS="yes"  # page.md -> page/index.html

# Date format
DATE_FORMAT="%Y-%m-%d"

# Blog settings
BLOG_DIR="blog/"
POSTS_PER_PAGE="10"
